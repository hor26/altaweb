<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo cuadrado con esquinas redondeadas -->
  <rect width="1080" height="1080" fill="#0D0B1E" rx="220"/>

  <!-- Glow violeta central -->
  <radialGradient id="gv" cx="50%" cy="48%" r="55%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>
  <rect width="1080" height="1080" fill="url(#gv)" rx="220"/>

  <!-- Glow lima en el apex -->
  <radialGradient id="gl" cx="50%" cy="20%" r="30%">
    <stop offset="0%" stop-color="#A3E635" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#A3E635" stop-opacity="0"/>
  </radialGradient>
  <rect width="1080" height="1080" fill="url(#gl)" rx="220"/>

  <!-- Trazo izquierdo — violeta -->
  <line x1="270" y1="790" x2="540" y2="240" stroke="#7C3AED" stroke-width="64" stroke-linecap="round"/>

  <!-- Trazo derecho — lima -->
  <line x1="540" y1="240" x2="810" y2="790" stroke="#A3E635" stroke-width="64" stroke-linecap="round"/>

  <!-- Barra central — violeta claro -->
  <line x1="370" y1="570" x2="710" y2="570" stroke="#9F67F5" stroke-width="42" stroke-linecap="round"/>

  <!-- Punto apex lima -->
  <circle cx="540" cy="240" r="42" fill="#A3E635"/>
</svg>

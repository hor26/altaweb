<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo oscuro -->
  <rect width="1080" height="1080" fill="#0D0B1E"/>

  <!-- Glow violeta -->
  <radialGradient id="gv" cx="30%" cy="70%" r="60%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>
  <rect width="1080" height="1080" fill="url(#gv)"/>

  <!-- Glow lima superior derecho -->
  <radialGradient id="gl" cx="75%" cy="20%" r="40%">
    <stop offset="0%" stop-color="#A3E635" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#A3E635" stop-opacity="0"/>
  </radialGradient>
  <rect width="1080" height="1080" fill="url(#gl)"/>

  <!-- Línea decorativa lima izquierda -->
  <rect x="0" y="0" width="8" height="1080" fill="#A3E635" opacity="0.6"/>

  <!-- LOGO arriba izquierda -->
  <!-- A icono pequeño -->
  <line x1="52" y1="95" x2="72" y2="55" stroke="#7C3AED" stroke-width="6" stroke-linecap="round"/>
  <line x1="72" y1="55" x2="92" y2="95" stroke="#A3E635" stroke-width="6" stroke-linecap="round"/>
  <line x1="59" y1="78" x2="85" y2="78" stroke="#9F67F5" stroke-width="4" stroke-linecap="round"/>
  <circle cx="72" cy="55" r="4" fill="#A3E635"/>
  <!-- Wordmark -->
  <text x="104" y="80" font-family="Arial Black, Arial" font-size="26" font-weight="900" fill="#FFFFFF" letter-spacing="1">Alta</text>
  <text x="162" y="80" font-family="Arial Black, Arial" font-size="26" font-weight="900" fill="#A3E635" letter-spacing="1">Web</text>
  <text x="104" y="96" font-family="Arial" font-size="11" fill="#A3E635" letter-spacing="2" opacity="0.7">altaweb.pe</text>

  <!-- Separador -->
  <line x1="44" y1="118" x2="320" y2="118" stroke="#A3E635" stroke-width="1.5" opacity="0.3"/>

  <!-- TAG rubro -->
  <rect x="44" y="148" width="220" height="36" rx="18" fill="#A3E635" opacity="0.15"/>
  <rect x="44" y="148" width="220" height="36" rx="18" fill="none" stroke="#A3E635" stroke-width="1.5" opacity="0.5"/>
  <text x="154" y="172" text-anchor="middle" font-family="Arial" font-size="14" fill="#A3E635" letter-spacing="2">PARA CONSULTORIOS</text>

  <!-- HEADLINE principal -->
  <text x="44" y="280" font-family="Arial Black, Arial" font-size="72" font-weight="900" fill="#FFFFFF">¿Tu</text>
  <text x="44" y="362" font-family="Arial Black, Arial" font-size="72" font-weight="900" fill="#FFFFFF">negocio</text>
  <text x="44" y="444" font-family="Arial Black, Arial" font-size="72" font-weight="900" fill="#A3E635">no aparece</text>
  <text x="44" y="526" font-family="Arial Black, Arial" font-size="72" font-weight="900" fill="#FFFFFF">en Google?</text>

  <!-- Línea separadora -->
  <line x1="44" y1="560" x2="400" y2="560" stroke="#7C3AED" stroke-width="3" opacity="0.6"/>

  <!-- Subheadline -->
  <text x="44" y="618" font-family="Arial" font-size="28" fill="#FFFFFF" opacity="0.9">En Alta Web te creamos tu</text>
  <text x="44" y="656" font-family="Arial" font-size="28" fill="#FFFFFF" opacity="0.9">página web profesional</text>
  <text x="44" y="694" font-family="Arial Black, Arial" font-size="28" font-weight="900" fill="#A3E635">en 72 horas.</text>

  <!-- Beneficios -->
  <circle cx="56" cy="752" r="5" fill="#A3E635"/>
  <text x="74" y="758" font-family="Arial" font-size="22" fill="#FFFFFF" opacity="0.8">Pago único · Sin mensualidades</text>

  <circle cx="56" cy="796" r="5" fill="#A3E635"/>
  <text x="74" y="802" font-family="Arial" font-size="22" fill="#FFFFFF" opacity="0.8">SEO incluido desde el primer día</text>

  <circle cx="56" cy="840" r="5" fill="#A3E635"/>
  <text x="74" y="846" font-family="Arial" font-size="22" fill="#FFFFFF" opacity="0.8">Hosting incluido el primer año</text>

  <!-- CTA botón -->
  <rect x="44" y="900" width="420" height="72" rx="36" fill="#A3E635"/>
  <text x="254" y="944" text-anchor="middle" font-family="Arial Black, Arial" font-size="26" font-weight="900" fill="#0D0B1E">Escríbenos · Desde S/350</text>

  <!-- Precio esquina derecha -->
  <text x="1036" y="200" text-anchor="end" font-family="Arial" font-size="18" fill="#FFFFFF" opacity="0.4">Desde</text>
  <text x="1036" y="260" text-anchor="end" font-family="Arial Black, Arial" font-size="88" font-weight="900" fill="#A3E635">350</text>
  <text x="1036" y="300" text-anchor="end" font-family="Arial" font-size="20" fill="#A3E635" opacity="0.8">soles · pago único</text>

  <!-- Elemento decorativo A grande fondo -->
  <line x1="700" y1="900" x2="1000" y2="350" stroke="#7C3AED" stroke-width="80" stroke-linecap="round" opacity="0.08"/>
  <line x1="1000" y1="350" x2="1200" y2="900" stroke="#A3E635" stroke-width="80" stroke-linecap="round" opacity="0.08"/>
  <line x1="780" y1="670" x2="1080" y2="670" stroke="#9F67F5" stroke-width="50" stroke-linecap="round" opacity="0.06"/>
</svg>

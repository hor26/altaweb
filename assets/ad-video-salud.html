<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Ad Video — Alta Web Salud</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0D0B1E;
    font-family: 'Arial Black', Arial, sans-serif;
  }

  .scene {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
  }

  /* Fondo gradiente animado */
  .bg-glow-purple {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.4) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    animation: pulsePurple 4s ease-in-out infinite;
  }
  .bg-glow-lime {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(163,230,53,0.2) 0%, transparent 70%);
    top: -80px; right: -80px;
    animation: pulseLime 3s ease-in-out infinite;
  }

  @keyframes pulsePurple {
    0%,100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.15); opacity: 1; }
  }
  @keyframes pulseLime {
    0%,100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.2); opacity: 0.9; }
  }

  /* Línea izquierda */
  .line-left {
    position: absolute;
    left: 0; top: 0;
    width: 8px; height: 100%;
    background: linear-gradient(to bottom, #A3E635, #7C3AED);
    animation: lineSlide 1s ease-out forwards;
    transform: scaleY(0);
    transform-origin: top;
  }
  @keyframes lineSlide {
    to { transform: scaleY(1); }
  }

  /* Logo */
  .logo {
    position: absolute;
    top: 52px; left: 52px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0.5s forwards;
  }
  .logo svg { width: 52px; height: 52px; }
  .logo-text { display: flex; flex-direction: column; }
  .logo-name { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 1px; }
  .logo-name span { color: #A3E635; }
  .logo-url { font-size: 13px; color: #A3E635; letter-spacing: 2px; opacity: 0.8; }

  /* TAG */
  .tag {
    position: absolute;
    top: 148px; left: 52px;
    background: rgba(163,230,53,0.12);
    border: 1.5px solid rgba(163,230,53,0.5);
    border-radius: 20px;
    padding: 8px 24px;
    font-size: 14px; color: #A3E635; letter-spacing: 3px;
    font-family: Arial, sans-serif; font-weight: 700;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0.9s forwards;
  }

  /* HEADLINE */
  .h1 {
    position: absolute;
    top: 218px; left: 52px;
    font-size: 90px; font-weight: 900;
    color: #fff; line-height: 1.05;
    opacity: 0;
    animation: fadeUp 0.7s ease-out 1.3s forwards;
  }
  .h1 .lime { color: #A3E635; }

  /* Línea separadora */
  .separator {
    position: absolute;
    top: 572px; left: 52px;
    width: 0; height: 3px;
    background: linear-gradient(to right, #7C3AED, transparent);
    animation: expandLine 0.8s ease-out 2.2s forwards;
  }
  @keyframes expandLine {
    to { width: 420px; }
  }

  /* Subheadline */
  .sub {
    position: absolute;
    top: 598px; left: 52px;
    font-family: Arial, sans-serif;
    font-size: 30px; color: rgba(255,255,255,0.9);
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 2.4s forwards;
  }
  .sub strong { color: #A3E635; font-weight: 900; }

  /* Beneficios */
  .benefits {
    position: absolute;
    top: 748px; left: 52px;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 3s forwards;
  }
  .benefit {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
    font-family: Arial, sans-serif;
    font-size: 22px; color: rgba(255,255,255,0.85);
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #A3E635;
    flex-shrink: 0;
  }

  /* CTA */
  .cta {
    position: absolute;
    bottom: 72px; left: 52px;
    background: #A3E635;
    border-radius: 40px;
    padding: 22px 48px;
    font-size: 28px; font-weight: 900;
    color: #0D0B1E; letter-spacing: 0.5px;
    opacity: 0;
    transform: scale(0.9);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 3.6s forwards;
  }
  @keyframes popIn {
    to { opacity: 1; transform: scale(1); }
  }

  /* Precio */
  .price {
    position: absolute;
    top: 160px; right: 60px;
    text-align: right;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 1.6s forwards;
  }
  .price-desde { font-family: Arial, sans-serif; font-size: 20px; color: rgba(255,255,255,0.4); }
  .price-num { font-size: 110px; font-weight: 900; color: #A3E635; line-height: 1; }
  .price-unit { font-family: Arial, sans-serif; font-size: 20px; color: rgba(163,230,53,0.7); }

  /* Logo A decorativo fondo */
  .deco-a {
    position: absolute;
    right: -60px; bottom: 80px;
    opacity: 0;
    animation: fadeIn 1s ease-out 1s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Partículas animadas */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: #A3E635;
    animation: float linear infinite;
    opacity: 0.3;
  }
  @keyframes float {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-300px) rotate(360deg); opacity: 0; }
  }

  /* Pulso CTA */
  .cta-pulse {
    position: absolute;
    bottom: 72px; left: 52px;
    width: 340px; height: 72px;
    border-radius: 40px;
    border: 2px solid #A3E635;
    opacity: 0;
    animation: ctaPulse 1.5s ease-out 4.2s infinite;
  }
  @keyframes ctaPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.15); opacity: 0; }
  }
</style>
</head>
<body>
<div class="scene">

  <!-- Fondos -->
  <div class="bg-glow-purple"></div>
  <div class="bg-glow-lime"></div>

  <!-- Partículas -->
  <div class="particle" style="width:6px;height:6px;left:200px;bottom:0;animation-duration:8s;animation-delay:0s"></div>
  <div class="particle" style="width:4px;height:4px;left:450px;bottom:0;animation-duration:11s;animation-delay:2s"></div>
  <div class="particle" style="width:8px;height:8px;left:800px;bottom:0;animation-duration:9s;animation-delay:1s"></div>
  <div class="particle" style="width:5px;height:5px;left:650px;bottom:0;animation-duration:13s;animation-delay:3s"></div>
  <div class="particle" style="width:4px;height:4px;left:320px;bottom:0;animation-duration:10s;animation-delay:0.5s"></div>

  <!-- Línea izquierda -->
  <div class="line-left"></div>

  <!-- Logo A decorativo fondo -->
  <div class="deco-a">
    <svg width="420" height="500" viewBox="0 0 420 500" xmlns="http://www.w3.org/2000/svg">
      <line x1="30" y1="480" x2="210" y2="40" stroke="#7C3AED" stroke-width="70" stroke-linecap="round" opacity="0.07"/>
      <line x1="210" y1="40" x2="390" y2="480" stroke="#A3E635" stroke-width="70" stroke-linecap="round" opacity="0.07"/>
      <line x1="90" y1="295" x2="330" y2="295" stroke="#9F67F5" stroke-width="45" stroke-linecap="round" opacity="0.05"/>
    </svg>
  </div>

  <!-- Logo -->
  <div class="logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#0D0B1E"/>
      <radialGradient id="gv" cx="50%" cy="48%" r="52%">
        <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
      </radialGradient>
      <circle cx="50" cy="50" r="50" fill="url(#gv)"/>
      <line x1="22" y1="78" x2="50" y2="24" stroke="#7C3AED" stroke-width="7" stroke-linecap="round"/>
      <line x1="50" y1="24" x2="78" y2="78" stroke="#A3E635" stroke-width="7" stroke-linecap="round"/>
      <line x1="32" y1="56" x2="68" y2="56" stroke="#9F67F5" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="50" cy="24" r="5" fill="#A3E635"/>
    </svg>
    <div class="logo-text">
      <div class="logo-name">Alta<span>Web</span></div>
      <div class="logo-url">altaweb.pe</div>
    </div>
  </div>

  <!-- TAG -->
  <div class="tag">PARA CONSULTORIOS</div>

  <!-- HEADLINE -->
  <div class="h1">
    ¿Tu<br>
    negocio<br>
    <span class="lime">no aparece</span><br>
    en Google?
  </div>

  <!-- Precio -->
  <div class="price">
    <div class="price-desde">Desde</div>
    <div class="price-num">350</div>
    <div class="price-unit">soles · pago único</div>
  </div>

  <!-- Separador -->
  <div class="separator"></div>

  <!-- Subheadline -->
  <div class="sub">
    Te creamos tu web profesional<br>
    <strong>en 72 horas.</strong>
  </div>

  <!-- Beneficios -->
  <div class="benefits">
    <div class="benefit"><div class="dot"></div>Pago único · Sin mensualidades</div>
    <div class="benefit"><div class="dot"></div>SEO incluido desde el primer día</div>
    <div class="benefit"><div class="dot"></div>Hosting incluido el primer año</div>
  </div>

  <!-- Pulso CTA -->
  <div class="cta-pulse"></div>

  <!-- CTA -->
  <div class="cta">Escríbenos · Desde S/350</div>

</div>
</body>
</html>
